# Project-specific AI-Kit configuration.
# Keep runtime, skills, and provider binaries in ~/ai-kit.
project:
  stack: []
  source_dirs: []

# Optional canonical project knowledge. `off` keeps projects independent of
# any specific documentation layout; `blueprint` reads Blueprint/blueprint.json.
knowledge:
  provider: off
  manifest: Blueprint/blueprint.json

# Small fixes still use the control plane, but can skip planning and review.
# Enable per project when this shortened lifecycle is appropriate.
workflow:
  # Explicitly close normal tasks after QA when reviewer is off.
  close_after_qa: false
  micro_tasks:
    enabled: false
    max_files: 2
    require_qa: true
    require_review: false

# `cwd` is relative to the project root. Empty values mean that this project
# has not declared that check yet.
verification:
  cwd:
  test_command:
  typecheck_command:
  build_command:
  lint_command:
  # Optional named checks are appended to the legacy commands above.
  # Their names classify gate evidence, for example migration or live-smoke.
  # checks:
  #   migration: npm run db:check
  #   live-smoke: ./scripts/smoke.sh
