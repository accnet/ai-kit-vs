name: AI-Kit gates

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install Node runtime dependencies
        run: npm --prefix .ai/node ci
      - name: Node runtime tests
        run: npm test
      - name: Validate kit contracts
        run: bash .ai/scripts/check-kit.sh
      - name: Validate skill contracts
        run: bash .ai/scripts/check-skills.sh
      - name: Gate G4 hygiene
        run: bash .ai/scripts/check-gates.sh all
